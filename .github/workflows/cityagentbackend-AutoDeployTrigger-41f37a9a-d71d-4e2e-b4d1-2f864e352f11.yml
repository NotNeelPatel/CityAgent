name: Trigger auto deployment for cityagentbackend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ 148-backend-cicd ]
    paths:
    - '**'
    - '.github/workflows/cityagentbackend-AutoDeployTrigger-41f37a9a-d71d-4e2e-b4d1-2f864e352f11.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: backend
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CITYAGENTBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CITYAGENTBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CITYAGENTBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: cityagentregistry.azurecr.io
          registryUsername: ${{ secrets.CITYAGENTBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CITYAGENTBACKEND_REGISTRY_PASSWORD }}
          containerAppName: cityagentbackend
          resourceGroup: CityAgentResourceGroup
          imageToBuild: cityagentregistry.azurecr.io/cityagentbackend:${{ github.sha }}
          environmentVariables: |
            AZURE_API_BASE=${{ secrets.AZURE_API_BASE }}
            AZURE_API_BASE_EMBEDDING=${{ secrets.AZURE_API_BASE_EMBEDDING }}
            AZURE_API_KEY=secretref:${{ secrets.AZURE_API_KEY }}
            AZURE_API_KEY_EMBEDDING=secretref:${{ secrets.AZURE_API_KEY_EMBEDDING }}
            AZURE_API_VERSION=${{ secrets.AZURE_API_VERSION }}
            AZURE_API_VERSION_EMBEDDING=${{ secrets.AZURE_API_VERSION_EMBEDDING }}
            SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL }}
            SUPABASE_SERVICE_ROLE_KEY=secretref:${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            AI_API_PROVIDER=${{ vars.AI_API_PROVIDER }}
            EXCEL_ROWS_PER_VECTOR=${{ vars.EXCEL_ROWS_PER_VECTOR }}
            SUPABASE_CONTENT_COLUMN=${{ vars.SUPABASE_CONTENT_COLUMN }}
            SUPABASE_INSERT_BATCH_SIZE=${{ vars.SUPABASE_INSERT_BATCH_SIZE }}
            SUPABASE_MATCH_COUNT=${{ vars.SUPABASE_MATCH_COUNT }}
            SUPABASE_MATCH_MODE=${{ vars.SUPABASE_MATCH_MODE }}
            SUPABASE_MATCH_RPC=${{ vars.SUPABASE_MATCH_RPC }}
            SUPABASE_METADATA_COLUMN=${{ vars.SUPABASE_METADATA_COLUMN }}
            SUPABASE_SOURCE_BUCKET_COLUMN=${{ vars.SUPABASE_SOURCE_BUCKET_COLUMN }}
            SUPABASE_SOURCE_FILENAME_COLUMN=${{ vars.SUPABASE_SOURCE_FILENAME_COLUMN }}
            SUPABASE_VECTOR_TABLE=${{ vars.SUPABASE_VECTOR_TABLE }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


