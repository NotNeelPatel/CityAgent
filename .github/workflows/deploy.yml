name: Deploy

on:
  push:
    branches:
      - main
      - docker-deployment #temp 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
      VITE_SUPABASE_PUBLISHABLE_OR_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_OR_ANON_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      EXCEL_ROWS_PER_VECTOR: ${{ vars.EXCEL_ROWS_PER_VECTOR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      - name: Deploy
        run: npm run deploy
        working-directory: ./frontend
